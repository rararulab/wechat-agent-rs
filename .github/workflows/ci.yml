name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  rust:
    name: Rust
    uses: ./.github/workflows/rust.yml

  release-pr:
    name: Release PR
    needs: [lint, rust]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.lint.result == 'success' && needs.rust.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-pr.yml
